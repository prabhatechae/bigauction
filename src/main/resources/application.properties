spring.application.name=big-auction

# ==================== Database ====================
# Database — set these in /opt/bigauction/.env
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bigauction?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rootroot}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================== JWT ====================
# Secret comes from the JWT_SECRET env var in production (see /opt/bigauction/.env).
# The fallback after ':' is only for local development.
app.jwt.secret=${JWT_SECRET:BigAuctionSecretKey2026ForJWTTokenGenerationAndValidation}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==================== Server ====================
server.port=8080

# ==================== File Upload ====================
app.upload.dir=uploads/images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
