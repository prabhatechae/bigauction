spring.application.name=big-auction

# ==================== Database ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/bigauction
spring.datasource.username=akhil
spring.datasource.password=AkkiMatta@11
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== JWT ====================
app.jwt.secret=bigauction-super-secret-key-must-be-at-least-256-bits-long-for-security
app.jwt.expiration-ms=86400000

# ==================== Server ====================
server.port=8080

# ==================== File Upload ====================
app.upload.dir=uploads/images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
